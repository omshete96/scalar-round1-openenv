---
name: supply-chain-env
version: "1.0.0"
description: >
  Real-world supply chain simulation. Agent manages inventory across 3 SKUs,
  selects vendors, and recovers from disruptions. Tasks range from easy
  reorder-point optimization to hard cascading disruption recovery.
author: "hackathon-submitter"
sdk: gradio
sdk_version: "4.0"
app_file: server/app.py
python_version: "3.11"

tasks:
  - id: reorder_point
    name: "Reorder point optimization"
    difficulty: easy
    max_steps: 10
    description: >
      Set optimal reorder quantities given known demand and lead times.
      Agent must keep all 3 SKUs above safety stock for all 10 steps.

  - id: vendor_selection
    name: "Multi-vendor selection under risk"
    difficulty: medium
    max_steps: 20
    description: >
      Choose from 3 vendors with different cost/quality/reliability tradeoffs.
      Minimize total cost while keeping quality score >= 0.75.

  - id: disruption_recovery
    name: "Cascading disruption recovery"
    difficulty: hard
    max_steps: 30
    description: >
      A port strike hits on step 5, cutting off primary supplier.
      Agent must reroute, expedite, and rebalance inventory within 8 steps.
      Partial credit for partial recovery.

observation_space:
  type: dict
  fields:
    inventory: "list[float] — units on hand per SKU (3 SKUs)"
    pending_orders: "list[float] — units in transit per SKU"
    demand_forecast: "list[list[float]] — 7-day demand forecast per SKU"
    supplier_status: "list[str] — normal | delayed | disrupted"
    budget_remaining: "float"
    day: "int"
    disruption_active: "bool"

action_space:
  type: dict
  fields:
    order_qty: "dict[str, int] — sku_id -> quantity to order"
    switch_supplier: "bool — switch to backup supplier this step"
    expedite: "bool — pay 2.5x to get pending orders delivered immediately"
    reroute_shipment: "bool — reroute in-transit shipments away from disrupted route"
